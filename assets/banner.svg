<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#09090b" rx="20" />

  <!-- Abstract Grid Network Background -->
  <g opacity="0.15">
    <path d="M 0 100 L 1200 100 M 0 200 L 1200 200 M 0 300 L 1200 300" stroke="#ffffff" stroke-width="1" />
    <path d="M 200 0 L 200 400 M 400 0 L 400 400 M 600 0 L 600 400 M 800 0 L 800 400 M 1000 0 L 1000 400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Glowing Visual Network Mark -->
  <g transform="translate(450, 100)" filter="url(#glow)">
    <path d="M 100 100 Q 200 30 300 100 T 500 100" fill="none" stroke="url(#bannerGrad)" stroke-width="8" stroke-dasharray="15, 8" />
    <circle cx="100" cy="100" r="22" fill="#09090b" stroke="url(#bannerGrad)" stroke-width="6" />
    <circle cx="100" cy="100" r="8" fill="#3b82f6" />
    
    <rect x="275" y="75" width="50" height="50" rx="12" fill="#09090b" stroke="url(#bannerGrad)" stroke-width="6" transform="rotate(45 300 100)" />
    
    <circle cx="500" cy="100" r="22" fill="#09090b" stroke="url(#bannerGrad)" stroke-width="6" />
    <path d="M 500 85 L 505 96 L 516 96 L 507 101 L 511 112 L 500 105 L 489 112 L 493 101 L 484 96 L 495 96 Z" fill="url(#sparkGrad)" />
  </g>

  <!-- Title Text -->
  <g transform="translate(80, 170)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="1">FlowForge <tspan fill="url(#bannerGrad)">n8n</tspan></text>
    <text y="70" font-family="'Inter', sans-serif" font-weight="500" font-size="22" fill="#a1a1aa" letter-spacing="3">THE LOCAL-FIRST ENGINEERING TOOLKIT FOR n8n</text>
    <text y="110" font-family="'Inter', sans-serif" font-weight="400" font-size="16" fill="#71717a">Generate • Validate • Test • Sanitize • Document • Debug</text>
  </g>
</svg>
