<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Vibrant Blue-to-Purple Gradient -->
    <linearGradient id="forgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background for Dark Mode friendliness -->
  <rect width="100%" height="100%" fill="#09090b" rx="16" />

  <!-- Logo Mark: Connected Workflow Nodes + Forge Spark -->
  <g transform="translate(40, 25)">
    <!-- Connection Wires -->
    <path d="M 50 100 Q 110 50 170 100 T 290 100" fill="none" stroke="url(#forgeGrad)" stroke-width="6" stroke-dasharray="10, 5" />
    <path d="M 50 100 Q 110 150 170 100" fill="none" stroke="url(#forgeGrad)" stroke-width="4" opacity="0.6" />

    <!-- Node 1 (Trigger) -->
    <circle cx="50" cy="100" r="18" fill="#09090b" stroke="url(#forgeGrad)" stroke-width="5" filter="url(#glow)" />
    <circle cx="50" cy="100" r="6" fill="#3b82f6" />

    <!-- Node 2 (Logic / Transform) -->
    <rect x="145" y="75" width="50" height="50" rx="10" fill="#09090b" stroke="url(#forgeGrad)" stroke-width="5" transform="rotate(45 170 100)" />
    <circle cx="170" cy="100" r="6" fill="#8b5cf6" />

    <!-- Node 3 (Action + Spark) -->
    <circle cx="290" cy="100" r="18" fill="#09090b" stroke="url(#forgeGrad)" stroke-width="5" />
    <!-- Forge Spark Icon in Center -->
    <path d="M 290 88 L 294 97 L 303 97 L 296 102 L 299 111 L 290 105 L 281 111 L 284 102 L 277 97 L 286 97 Z" fill="url(#sparkGrad)" />
  </g>

  <!-- Typography -->
  <text x="380" y="125" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="1">FlowForge</text>
  <text x="705" y="125" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="64" fill="url(#forgeGrad)">n8n</text>
  <text x="385" y="175" font-family="'Inter', sans-serif" font-weight="500" font-size="18" fill="#a1a1aa" letter-spacing="2">THE AI ENGINEERING TOOLKIT FOR n8n</text>
</svg>
