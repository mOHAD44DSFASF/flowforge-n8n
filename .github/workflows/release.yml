name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Quality Linters
      run: pnpm lint

    - name: Run Type Check
      run: pnpm typecheck

    - name: Run Test Suites
      run: pnpm test

    - name: Build Bundles
      run: pnpm build

    # Exclude publishing stub credentials to NPM
