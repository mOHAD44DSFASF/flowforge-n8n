name: FlowForge Review

on:
  pull_request:
    paths:
      - "templates/**/*.json"
      - "tests/**/*.flowforge.test.json"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  flowforge-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: FlowForge offline CI smoke
        run: |
          mkdir -p tmp/flowforge-ci-smoke
          cp tests/fixtures/v2/regression-basic.flowforge.test.json tmp/flowforge-ci-smoke/regression-basic.flowforge.test.json
          cp -R tests/fixtures/v2/__snapshots__ tmp/flowforge-ci-smoke/__snapshots__
          FLOWFORGE_OFFLINE=1 node dist/cli.js ci tmp/flowforge-ci-smoke
